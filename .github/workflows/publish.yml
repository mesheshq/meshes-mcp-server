# This workflow will publish a package to npm when a release is created

name: Publish

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (tag like v1.2.3, sha, or branch). Leave blank to use the release tag when available."
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use release tag when release event; else use input ref
          ref: ${{ github.event.release.tag_name || inputs.ref || github.sha }}
      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Upload dist + package metadata
        uses: actions/upload-artifact@v6
        with:
          name: package-build
          path: |
            dist/**
            package.json
            README.md
            LICENSE

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout (for repo context)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.ref || github.sha }}
      - name: Use Node 24 (OIDC publish)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: package-build
      - name: Install dependencies
        run: npm ci
      - name: Publish (OIDC only)
        run: npm publish --access public
