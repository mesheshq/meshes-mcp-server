# This workflow will publish a package to npm when a release is created

name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (tag like v1.2.3, sha, or branch). Leave blank to use the release tag when available."
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Publish
        run: npm publish --provenance --access public
